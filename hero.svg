<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2b1d16"/>
      <stop offset="55%" stop-color="#3d2820"/>
      <stop offset="100%" stop-color="#1a1109"/>
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="25%" r="60%">
      <stop offset="0%" stop-color="#c4912f" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c4912f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="70%" r="55%">
      <stop offset="0%" stop-color="#7a2331" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7a2331" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>
  <rect width="1600" height="900" fill="url(#glow2)"/>

  <!-- table horizon -->
  <rect x="0" y="640" width="1600" height="260" fill="#140d09"/>
  <rect x="0" y="640" width="1600" height="6" fill="rgba(196,145,47,0.4)"/>

  <!-- plate silhouettes -->
  <ellipse cx="300" cy="700" rx="220" ry="46" fill="rgba(248,234,217,0.06)"/>
  <ellipse cx="300" cy="700" rx="150" ry="30" fill="rgba(248,234,217,0.10)"/>
  <ellipse cx="1300" cy="760" rx="260" ry="52" fill="rgba(248,234,217,0.05)"/>
  <ellipse cx="1300" cy="760" rx="180" ry="34" fill="rgba(248,234,217,0.09)"/>

  <!-- candle glow accents -->
  <circle cx="820" cy="560" r="5" fill="#f5c15a"/>
  <ellipse cx="820" cy="545" rx="14" ry="22" fill="rgba(245,193,90,0.5)"/>
  <circle cx="1120" cy="600" r="4" fill="#f5c15a"/>
  <ellipse cx="1120" cy="588" rx="11" ry="18" fill="rgba(245,193,90,0.45)"/>

  <!-- faint fork/knife line art scattered -->
  <g stroke="rgba(248,234,217,0.18)" stroke-width="3" fill="none">
    <line x1="140" y1="120" x2="140" y2="260"/>
    <line x1="120" y1="120" x2="120" y2="180"/>
    <line x1="160" y1="120" x2="160" y2="180"/>
    <path d="M1460,120 C1490,120 1498,160 1478,190 C1470,200 1466,212 1466,226 L1466,260"/>
  </g>
</svg>